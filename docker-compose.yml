services:
  postgres:
    image: postgres:16
    container_name: marocsphere-db
    environment:
      POSTGRES_DB: marocsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: marocsphere-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      FRONTEND_ORIGINS: http://localhost:4000,http://127.0.0.1:4000,http://localhost:4200,http://127.0.0.1:4200
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: marocsphere-web
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      API_TARGET: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
