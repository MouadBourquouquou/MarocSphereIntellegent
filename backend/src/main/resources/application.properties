spring.application.name=maroc-sphere

# =====================
# Base de données PostgreSQL locale
# Chaque membre de l'équipe doit :
# 1. Installer PostgreSQL
# 2. Créer une base nommée "marocsphere"
# 3. Mettre son mot de passe ci-dessous
# =====================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/marocsphere
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =====================
# Flyway (schema migrations)
# Runs before Hibernate to keep the schema in sync with entity changes.
# baseline-on-migrate: marks the existing schema as version 0 so Flyway
# can apply new migrations on top of it without failing.
# =====================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.org.flywaydb=INFO

jwt.secret=maCleSecreteTresLongueDeAuMoins32Caracteres1234567890
jwt.expiration=86400000