spring.application.name=maroc-sphere

# =====================
# Base de donnees PostgreSQL locale
# Chaque membre de l'equipe doit :
# 1. Installer PostgreSQL
# 2. Creer une base nommee "marocsphere"
# 3. Mettre son mot de passe ci-dessous
# =====================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/marocsphere
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=maCleSecreteTresLongueDeAuMoins32Caracteres1234567890
jwt.expiration=86400000

app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
