<div data-page="multi-role-authentication" class="login-page-wrapper">

  <!-- Decorative blob shapes -->
  <div class="blob blob-top-left"></div>
  <div class="blob blob-bottom-right"></div>

  <!-- Centered card -->
  <div class="login-card">

    <!-- Left: Form panel -->
    <div class="form-panel">

      <!-- Logo -->
      <div class="logo-area">
        <a routerLink="/">
          <img src="/pics/LOGOPRINCIPALE.png" alt="MarocSphere" class="login-logo" />
        </a>
      </div>

      <h1 class="welcome-title">Welcome back</h1>

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="error-banner">
          {{ errorMessage() }}
        </div>
      }

      <!-- Login Form -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

        <!-- Email -->
        <div class="input-group">
          <input
            type="email"
            formControlName="email"
            placeholder="Email address"
            class="login-input"
            autocomplete="email"
          />
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
        </div>

        <!-- Password -->
        <div class="input-group">
          <input
            type="password"
            formControlName="password"
            placeholder="Password"
            class="login-input"
            autocomplete="current-password"
          />
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
        </div>

        <!-- Remember me + Forgot password -->
        <div class="form-row">
          <label class="remember-label">
            <input type="checkbox" class="remember-checkbox" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="login-btn"
        >
          @if (isLoading()) {
            Connexion en cours...
          } @else {
            Log in &nbsp;→
          }
        </button>

      </form>

      <!-- Sign up link -->
      <p class="signup-prompt">
        New to MarocSphere?&nbsp;
        <a routerLink="/sign-up" class="signup-link">Create account</a>
      </p>

    </div>

    <!-- Right: Moroccan photo -->
    <div class="photo-panel">
      <img
        src="/images/marrakech1.png"
        alt="Moroccan riad courtyard"
        class="riad-photo"
      />
      <div class="photo-caption">Your Moroccan Adventure Awaits</div>
    </div>

  </div>
</div>
