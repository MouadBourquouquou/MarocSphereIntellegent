spring.application.name=maroc-sphere

# =====================
# Base de données PostgreSQL locale
# Chaque membre de l'équipe doit :
# 1. Installer PostgreSQL
# 2. Créer une base nommée "marocsphere"
# 3. Mettre son mot de passe ci-dessous
# =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/marocsphere
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=maCleSecreteTresLongueDeAuMoins32Caracteres1234567890
jwt.expiration=86400000